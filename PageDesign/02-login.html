<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录页</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">ProjectTrace</div>
    <div><a href="./01-index.html">返回导航</a></div>
  </div>
  <div class="hero">
    <div class="card">
      <h3>平台登录</h3>
      <div class="form-grid">
        <div>
          <div class="small muted">账号</div>
          <div class="field">请输入用户名 / 邮箱 / 手机号</div>
        </div>
        <div>
          <div class="small muted">密码</div>
          <div class="field">请输入密码</div>
        </div>
        <div>
          <div class="small muted">验证码</div>
          <div class="field">图形验证码输入框</div>
        </div>
        <div>
          <div class="small muted">登录方式</div>
          <div class="field">密码登录 / 验证码登录</div>
        </div>
      </div>
      <div class="toolbar" style="margin-top:16px;">
        <span class="btn">登录</span>
        <span class="btn btn-light">忘记密码</span>
      </div>
      <hr />
      <h4>平台简介</h4>
      <ul class="list-plain">
        <li>内部项目跟踪、过程晾晒、透明协作平台</li>
        <li>支持项目、需求、任务、测试、缺陷、OKR、报表</li>
        <li>登录后进入个人工作台</li>
      </ul>
      <h4>公告区</h4>
      <div class="field">1. 本周新版本将于周五上线；2. OKR 季度更新截止到 3 月 28 日</div>
    </div>
  </div>
</body>
</html>
