<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目中心</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">ProjectTrace / 项目中心</div>
    <div><a href="./01-index.html">页面导航</a></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <a href="./03-dashboard.html">工作台</a>
      <a class="active" href="./04-project-list.html">项目中心</a>
      <a href="./05-project-detail.html">项目详情</a>
      <a href="./14-report-center.html">统计报表</a>
    </div>
    <div class="main">
      <div class="page-title">
        <h1>项目中心</h1>
        <div class="toolbar">
          <span class="btn">新建项目</span>
          <span class="btn btn-light">导出列表</span>
        </div>
      </div>
      <div class="card">
        <h3>筛选区</h3>
        <div class="form-grid">
          <div><div class="small muted">项目名称</div><div class="field">输入关键字</div></div>
          <div><div class="small muted">项目状态</div><div class="field">全部 / 进行中 / 风险中 / 已完成</div></div>
          <div><div class="small muted">项目经理</div><div class="field">选择负责人</div></div>
          <div><div class="small muted">部门</div><div class="field">选择部门</div></div>
        </div>
      </div>
      <div class="grid grid-4" style="margin-top:16px;">
        <div class="card"><h3>项目总数</h3><div style="font-size:28px;">26</div></div>
        <div class="card"><h3>进行中</h3><div style="font-size:28px;">14</div></div>
        <div class="card"><h3>风险中</h3><div style="font-size:28px;">4</div></div>
        <div class="card"><h3>本月结项</h3><div style="font-size:28px;">3</div></div>
      </div>
      <div class="card" style="margin-top:16px;">
        <h3>项目列表</h3>
        <table class="table">
          <tr><th>项目名称</th><th>类型</th><th>项目经理</th><th>进度</th><th>里程碑</th><th>风险</th><th>状态</th></tr>
          <tr><td><a href="./05-project-detail.html">CRM 重构</a></td><td>研发项目</td><td>王强</td><td>68%</td><td>联调阶段</td><td>2</td><td><span class="tag warn">风险中</span></td></tr>
          <tr><td>数据中台</td><td>平台项目</td><td>李敏</td><td>51%</td><td>Sprint-2</td><td>1</td><td><span class="tag">进行中</span></td></tr>
          <tr><td>门户升级</td><td>交付项目</td><td>赵宁</td><td>92%</td><td>发布验证</td><td>0</td><td><span class="tag">上线中</span></td></tr>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
