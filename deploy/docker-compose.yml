version: "3.9"

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: projecttrace-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: projecttrace-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env.example
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=projecttrace
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    volumes:
      - ../backend:/app
      - ../backend/data:/app/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: projecttrace-postgres
    environment:
      - POSTGRES_DB=projecttrace
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: projecttrace-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
