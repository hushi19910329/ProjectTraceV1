version: "3.9"

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: projecttrace-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: projecttrace-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env.example
    volumes:
      - ../backend:/app
      - ../backend/data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:8
    container_name: projecttrace-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
